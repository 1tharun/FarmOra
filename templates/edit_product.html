{% extends 'base.html' %}
{% block title %}Edit Product{% endblock %}
{% block content %}
<style>
  .wrap { max-width: 580px; margin: 0 auto; padding: 2.5rem 1.5rem; }
  .page-head { margin-bottom: 2rem; }
  .page-head .eyebrow { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin-bottom: 4px; }
  .page-head h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; color: var(--forest); }
  .card {
    background: var(--parchment); border: 1.5px solid var(--parchment-dk);
    border-radius: 8px; padding: 2.2rem;
    box-shadow: var(--shadow-md);
    position: relative;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--forest), var(--gold), var(--forest));
    border-radius: 8px 8px 0 0;
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .btn-row { display: flex; gap: 10px; margin-top: 0.5rem; }
  .btn-submit {
    flex: 1; padding: 13px;
    background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 100%);
    color: var(--gold-lt); border: none; border-radius: 5px;
    font-family: 'Jost', sans-serif; font-size: 0.92rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
  }
  .btn-submit:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-cancel {
    padding: 13px 20px; background: transparent;
    color: var(--ink-mid); border: 1.5px solid var(--parchment-dk);
    border-radius: 5px; font-family: 'Jost', sans-serif;
    font-size: 0.92rem; font-weight: 500; text-decoration: none;
    display: inline-flex; align-items: center; transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--ink-mid); }

  /* Preview image */
  .img-preview { width: 100%; height: 160px; border-radius: 6px; overflow: hidden; margin-bottom: 0.5rem; background: var(--sage-pale); display: none; }
  .img-preview img { width: 100%; height: 100%; object-fit: cover; }
  .img-preview.show { display: block; }
  .hint { font-size: 0.74rem; color: var(--ink-lt); margin-top: 4px; }
</style>

<div class="wrap">
  <div class="page-head">
    <div class="eyebrow">Farmer Portal</div>
    <h1>Edit Product</h1>
  </div>
  <div class="card">
    <form method="POST" action="/edit-product/{{ product.id }}/">
      {% csrf_token %}
      <div class="form-grid">
        <div class="field-group">
          <label class="field-label">Product Name</label>
          <input class="field-input" type="text" name="name" value="{{ product.name }}" required />
        </div>
        <div class="field-group">
          <label class="field-label">Telugu Name</label>
          <input class="field-input" type="text" name="telugu_name" value="{{ product.telugu_name }}" />
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Price (₹ per kg)</label>
        <input class="field-input" type="number" name="price" value="{{ product.price }}" min="1" step="0.01" required />
      </div>
      <div class="field-group">
        <label class="field-label">Product Image URL</label>
        {% if product.image %}
          <div class="img-preview show" id="imgPreview">
            <img src="{{ product.image }}" alt="preview" id="previewThumb" />
          </div>
        {% else %}
          <div class="img-preview" id="imgPreview">
            <img src="" alt="preview" id="previewThumb" />
          </div>
        {% endif %}
        <input class="field-input" type="url" name="image" id="imgUrl" value="{{ product.image }}" placeholder="https://…" oninput="previewImg(this.value)" />
        <div class="hint">Paste a direct image URL.</div>
      </div>
      <div class="btn-row">
        <button type="submit" class="btn-submit">Save Changes →</button>
        <a href="/farmer-dashboard/" class="btn-cancel">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script>
  function previewImg(url) {
    const wrap = document.getElementById('imgPreview');
    const thumb = document.getElementById('previewThumb');
    if (url) {
      thumb.src = url;
      thumb.onload = () => wrap.classList.add('show');
      thumb.onerror = () => wrap.classList.remove('show');
    } else { wrap.classList.remove('show'); }
  }
</script>
{% endblock %}
